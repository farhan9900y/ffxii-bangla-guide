name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper if missing
      run: |
        if [ ! -f "gradlew" ] && [ ! -f "android/gradlew" ]; then
          echo "Gradlew not found, generating a new wrapper..."
          gradle wrapper
        fi

    - name: Grant execute permission for gradlew
      run: |
        find . -name gradlew -exec chmod +x {} \;
      
    - name: Build with Gradle
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug || ./gradlew build || ./gradlew bundleDebug
        elif [ -f "android/gradlew" ]; then
          cd android
          ./gradlew assembleDebug || ./gradlew build || ./gradlew bundleDebug
        else
          GRADLE_DIR=$(dirname $(find . -name gradlew | head -n 1 2>/dev/null) || echo ".")
          if [ "$GRADLE_DIR" != "." ] && [ -n "$GRADLE_DIR" ]; then
            cd $GRADLE_DIR
            ./gradlew assembleDebug || ./gradlew build || ./gradlew bundleDebug
          else
            gradle assembleDebug || gradle build
          fi
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/bundle/debug/*.aab
          **/build/outputs/apk/**/*.apk
